version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: bitjourney_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bitjourney
      MYSQL_USER: bituser
      MYSQL_PASSWORD: bitpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bitjourney_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: bituser
      PMA_PASSWORD: bitpass
    ports:
      - "8081:80"
    depends_on:
      - db

  mongodb:
    image: mongo:latest
    container_name: bitjourney_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: mongopassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: "./Back end"
    container_name: bitjourney_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=bituser
      - DB_PASS=bitpass
      - DB_NAME=bitjourney
      - MONGO_URI=mongodb://mongoadmin:mongopassword@mongodb:27017
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongodb

  frontend:
    build: "./B1tJ0urney site"
    container_name: bitjourney_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  mongo_data:
