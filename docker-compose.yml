version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: bitjourney_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bitjourney
      MYSQL_USER: bituser
      MYSQL_PASSWORD: bitpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bitjourney_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: bituser
      PMA_PASSWORD: bitpass
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
