server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve static files
    location / {
        try_files $uri $uri/ =404;
    }

    # Redirect/Rewrite /merch or /merch/ to /about/merch.html
    rewrite ^/merch/?$ /about/merch.html break;
    rewrite ^/Merch/?$ /about/merch.html break;

    # Proxy /api requests to the backend service
    location /api/ {
        # Reescrever /api/login.php para /auth/login
        rewrite ^/api/login(?:\.php)?$ /auth/login break;
        
        # Reescrever /api/register.php para /auth/signup
        rewrite ^/api/register(?:\.php)?$ /auth/signup break;

        # Reescrever outras rotas /api/xyz para /xyz no backend
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
